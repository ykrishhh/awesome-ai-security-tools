<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awesome AI Security Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8ed;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.hero{text-align:center;padding:2rem;max-width:800px}
h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:800;background:linear-gradient(135deg,#00ff41,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
p{color:#888;font-size:1.2rem;margin-bottom:2rem}
.badges{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-bottom:2rem}
.badge{background:#00ff4122;border:1px solid #00ff4144;padding:.4rem 1rem;border-radius:2rem;font-size:.8rem;color:#00ff41}
.btn{display:inline-block;padding:1rem 2rem;background:#00ff41;color:#000;font-weight:700;border-radius:.5rem;text-decoration:none;font-size:1.1rem;transition:all .3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px #00ff4144}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hero">
<h1>🛡️ Awesome AI Security Tools</h1>
<p>200+ AI-powered security tools for pentesting, vuln scanning, threat intel</p>
<div class="badges">
<span class="badge">Open Source</span>
<span class="badge">MIT License</span>
<span class="badge">AI Powered</span>
</div>
<a href="https://github.com/ykrishhh/awesome-ai-security-tools" class="btn">View on GitHub ⭐</a>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
function r(){c.width=innerWidth;c.height=innerHeight}r();addEventListener('resize',r);
const p=Array.from({length:50},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1}));
function d(){x.clearRect(0,0,c.width,c.height);p.forEach(q=>{q.x+=q.vx;q.y+=q.vy;if(q.x<0||q.x>c.width)q.vx*=-1;if(q.y<0||q.y>c.height)q.vy*=-1;x.beginPath();x.arc(q.x,q.y,q.r,0,Math.PI*2);x.fillStyle='#00ff4144';x.fill()});p.forEach((a,i)=>p.slice(i+1).forEach(b=>{const l=Math.hypot(a.x-b.x,a.y-b.y);if(l<100){x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.strokeStyle='#00ff4111';x.stroke()}}));requestAnimationFrame(d)}d();
</script>
</body>
</html>
